<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alertlogs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="login-header">
                <div class="login-brand-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <h1 class="login-title">alertlogs</h1>
                <p class="login-subtitle">AlertManager Dashboard</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <div class="login-error" id="loginError"></div>
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-login-text">登 录</span>
                    <span class="btn-login-loading">登录中...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard (shown when authenticated) -->
    <div class="dashboard-container" id="dashboardContainer">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="header-brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                    </div>
                    <span class="brand-name">alertlogs</span>
                    <span class="brand-sub">AlertManager Dashboard</span>
                </div>
                <div class="header-right">
                    <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="切换主题">
                        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <div class="live-indicator">
                        <span class="live-dot"></span>
                        <span>实时监控</span>
                    </div>
                    <span class="last-update" id="lastUpdate">--</span>
                    <button class="btn-refresh" id="btnRefresh" onclick="forceRefresh()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        刷新
                    </button>
                    <button class="btn-logout" id="btnLogout" onclick="logout()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        退出
                    </button>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card stat-total">
                    <div class="stat-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <div class="stat-value" id="totalAlerts">—</div>
                        <div class="stat-label">总告警数</div>
                    </div>
                </div>
                <div class="stat-card stat-firing">
                    <div class="stat-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <div class="stat-value" id="firingAlerts">—</div>
                        <div class="stat-label">告警中 (Firing)</div>
                    </div>
                </div>
                <div class="stat-card stat-resolved">
                    <div class="stat-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <div class="stat-value" id="resolvedAlerts">—</div>
                        <div class="stat-label">已恢复 (Resolved)</div>
                    </div>
                </div>
                <div class="stat-card stat-today">
                    <div class="stat-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <div class="stat-value" id="todayAlerts">—</div>
                        <div class="stat-label">今日告警</div>
                    </div>
                </div>
                <div class="stat-card stat-recent">
                    <div class="stat-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <div class="stat-value" id="recentFiring">—</div>
                        <div class="stat-label">24h 内 Firing</div>
                    </div>
                </div>
                <div class="stat-card stat-p0">
                    <div class="stat-icon"><span style="font-weight:bold; font-size:16px;">P0</span></div>
                    <div class="stat-body">
                        <div class="stat-value" id="p0Alerts">—</div>
                        <div class="stat-label">P0 级告警</div>
                    </div>
                </div>
                <div class="stat-card stat-p2">
                    <div class="stat-icon"><span style="font-weight:bold; font-size:16px;">P2</span></div>
                    <div class="stat-body">
                        <div class="stat-value" id="p2Alerts">—</div>
                        <div class="stat-label">P2 级告警</div>
                    </div>
                </div>
                <div class="stat-card stat-p3">
                    <div class="stat-icon"><span style="font-weight:bold; font-size:16px;">P3</span></div>
                    <div class="stat-body">
                        <div class="stat-value" id="p3Alerts">—</div>
                        <div class="stat-label">P3 级告警</div>
                    </div>
                </div>
                <div class="stat-card stat-p9">
                    <div class="stat-icon"><span style="font-weight:bold; font-size:16px;">P9</span></div>
                    <div class="stat-body">
                        <div class="stat-value" id="p9Alerts">—</div>
                        <div class="stat-label">P9 级告警</div>
                    </div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="filter-label">状态</label>
                    <select class="filter-select" id="filterStatus">
                        <option value="">全部</option>
                        <option value="firing">🔴 Firing</option>
                        <option value="resolved">🟢 Resolved</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">级别</label>
                    <select class="filter-select" id="filterSeverity">
                        <option value="">全部</option>
                        <option value="critical">Critical</option>
                        <option value="warning">Warning</option>
                        <option value="info">Info</option>
                    </select>
                </div>
                <div class="filter-group filter-grow">
                    <label class="filter-label">alertmanager</label>
                    <input type="text" class="filter-input" id="filterAlertname" placeholder="搜索 alertmanager、实例...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">开始日期</label>
                    <input type="date" class="filter-input" id="filterStartDate">
                </div>
                <div class="filter-group">
                    <label class="filter-label">结束日期</label>
                    <input type="date" class="filter-input" id="filterEndDate">
                </div>
                <button class="btn-search" onclick="loadAlerts(1)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    查询
                </button>
                <button class="btn-reset" onclick="resetFilters()">重置</button>
            </div>

            <!-- Alert Table -->
            <div class="table-container">
                <div class="table-header">
                    <div class="table-title">
                        <span>告警记录</span>
                        <span class="table-count" id="paginationInfo"></span>
                    </div>
                    <div class="table-actions">
                        <label class="filter-label" style="margin:0">每页显示</label>
                        <select class="filter-select" id="pageSizeSelect" onchange="changePageSize()" style="width:80px">
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
                <div class="table-scroll">
                    <table class="alert-table">
                        <thead>
                            <tr>
                                <th style="width:60px">ID</th>
                                <th>alertmanager</th>
                                <th style="width:100px">状态</th>
                                <th>summary</th>
                                <th style="width:150px">开始时间</th>
                                <th style="width:150px">结束时间</th>
                                <th style="width:60px">详情</th>
                            </tr>
                        </thead>
                        <tbody id="alertTableBody">
                            <tr><td colspan="9" class="loading-row"><div class="spinner"></div> 加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="pagination-bar">
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Alert Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <h3 class="modal-title">告警详情</h3>
                    <p class="modal-subtitle" id="modalSubtitle"></p>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
